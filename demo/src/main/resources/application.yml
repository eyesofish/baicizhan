spring:
  application:
    name: baicizhan-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:h2:mem:baicizhan;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      repositories:
        enabled: false
  jackson:
    default-property-inclusion: non_null
server:
  port: 8080
  servlet:
    context-path: /

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  jwt:
    secret: ChangeMeToAProperLongRandomSecretForHS256AtLeast32Chars
    access-expire-seconds: 900
    refresh-expire-seconds: 1209600
  rate-limit:
    requests-per-minute: 240
  cache:
    term:
      ttl-minutes: 30
      null-ttl-seconds: 30
    review:
      ttl-seconds: 20
  ai:
    base-url: ${OPENAI_BASE_URL:http://127.0.0.1:18000/v1}
    api-key: ${OPENAI_API_KEY:LOCAL_DUMMY_KEY}
    model: ${LLM_MODEL:qwen2.5-7b-instruct}
    temperature: 0.7
    max-tokens: 256
    timeout-seconds: 120
  import:
    enabled: false
    source-file: ../datasets/high-frequency-vocabulary/30k-explained.txt
    limit: 10000
    source-language: en
    target-language: zh-Hans
    dry-run: false
    exit-on-finish: false
  learning:
    recall:
      review-quota: 100
      hard-quota: 50
      new-quota: 50
      total-candidates: 200
      recent-terms-for-user-vector: 30
    re-ranking:
      new-quota: 10
      review-quota: 7
      hard-quota: 3
      max-consecutive-same-source: 2
    ann:
      enabled: true
      base-url: http://127.0.0.1:18080
      timeout-ms: 300
      top-k: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
